<!-- Module 1 - Activity 2 - Curbside Thai "About" Page

  CASE: Sajja Adulet hired you to build the website for Curbside Thai, a Thai
  food truck in Charlotte, North Carolina. In this activity you build the
  "About" page for the site in THIS file (index.html).

  Start from a complete, valid HTML5 page (you did this in Activity 1: the
  document type declaration, the root element with its language, and a head
  with the page title and the UTF-8 character-encoding declaration). Also add
  an HTML comment in the head describing the page.

  Then build the page BODY using SEMANTIC structure. Research each concept in
  the tutorial; do not just wrap everything in generic boxes:

    1. A page header that holds the site name and a NAVIGATION area.
    2. Inside the navigation area, an unordered LIST of at least three
       hypertext LINKS to the site's other pages (About, Menu, Contact, ...).
    3. A main ARTICLE (the self-contained content of the page) containing:
         - a heading for the article, and
         - at least two PARAGRAPHS of text about the restaurant.
    4. Inside the article, an inline IMAGE. Every image needs the attribute
       that gives alternate text for screen readers and for when the image
       cannot load (this attribute is required even if its text is empty).
    5. Use TEXT-LEVEL markup inside your paragraphs: mark the restaurant name
       as text of strong importance, and mark a short phrase as emphasized.
    6. A page FOOTER with contact information that includes:
         - a link that dials a PHONE number, and
         - a link that opens an EMAIL to an address.
       (Look up the URL "schemes" used for telephone and e-mail links.)

  Concepts to research in the tutorial: sectioning elements (header, nav,
  article, footer), grouping elements (the paragraph and list elements),
  text-level elements (strong, em), inline images and the alt attribute, and
  hypertext links including the tel: and mailto: schemes.

  Delete this comment block once your page works, then open index.html in a
  browser to check it.
-->
